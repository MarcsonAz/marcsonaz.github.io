name: Atualizar Projetos JSON

on:
  push:
    branches:
      - main
    # Ignora mudanças no próprio arquivo projetos-github.json para evitar um loop infinito de commits
    paths-ignore:
      - 'assets/data/projetos-github.json'

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão necessária para o bot conseguir fazer o commit

    steps:
      - name: Fazer o checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar script de extração
        run: node fetch-repos.js

      - name: Fazer commit e push do novo JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/projetos-github.json
          # O comando abaixo verifica se houve alteração no projetos-github.json. 
          # Se não houver, ele ignora. Se houver, faz o commit e o push.
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: atualiza projetos-github.json com repositórios recentes" && git push)